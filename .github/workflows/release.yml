name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: houseabsolute/actions-rust-cross@576730dbfbb705690d43bd285987a3094fd84874 # v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release
      - name: Archive binary
        shell: bash
        run: |
          BINARY_NAME="ccjanus"
          ARCHIVE_NAME="${BINARY_NAME}-${{ matrix.target }}.tar.gz"
          cd target/${{ matrix.target }}/release
          tar czf "../../../${ARCHIVE_NAME}" "${BINARY_NAME}"
          cd ../../..
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ccjanus-${{ matrix.target }}
          path: ccjanus-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@b25b93d384199fc0fc8c2e126b2d937a0cbeb2ae # v2.5.2
        with:
          generate_release_notes: true
          files: artifacts/*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true
      - name: Calculate SHA256
        id: sha256
        run: |
          echo "x86_64_darwin=$(sha256sum artifacts/ccjanus-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "aarch64_darwin=$(sha256sum artifacts/ccjanus-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "x86_64_linux=$(sha256sum artifacts/ccjanus-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "aarch64_linux=$(sha256sum artifacts/ccjanus-aarch64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Checkout homebrew-ccjanus
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: miya10kei/homebrew-ccjanus
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-ccjanus
      - name: Update Formula
        env:
          VERSION: ${{ github.ref_name }}
          SHA256_X86_64_DARWIN: ${{ steps.sha256.outputs.x86_64_darwin }}
          SHA256_AARCH64_DARWIN: ${{ steps.sha256.outputs.aarch64_darwin }}
          SHA256_X86_64_LINUX: ${{ steps.sha256.outputs.x86_64_linux }}
          SHA256_AARCH64_LINUX: ${{ steps.sha256.outputs.aarch64_linux }}
        run: |
          VERSION="${VERSION#v}"
          cat > homebrew-ccjanus/Formula/ccjanus.rb << 'FORMULA'
          class Ccjanus < Formula
            desc "Claude Code PreToolUse Hook for auto-approving bash commands"
            homepage "https://github.com/miya10kei/ccjanus"
            version "__VERSION__"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/miya10kei/ccjanus/releases/download/v#{version}/ccjanus-x86_64-apple-darwin.tar.gz"
                sha256 "__SHA256_X86_64_DARWIN__"
              end
              if Hardware::CPU.arm?
                url "https://github.com/miya10kei/ccjanus/releases/download/v#{version}/ccjanus-aarch64-apple-darwin.tar.gz"
                sha256 "__SHA256_AARCH64_DARWIN__"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "https://github.com/miya10kei/ccjanus/releases/download/v#{version}/ccjanus-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "__SHA256_X86_64_LINUX__"
              end
              if Hardware::CPU.arm?
                url "https://github.com/miya10kei/ccjanus/releases/download/v#{version}/ccjanus-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "__SHA256_AARCH64_LINUX__"
              end
            end

            def install
              bin.install "ccjanus"
            end

            test do
              assert_match "ccjanus #{version}", shell_output("#{bin}/ccjanus --version")
            end
          end
          FORMULA
          sed -i "s/__VERSION__/${VERSION}/" homebrew-ccjanus/Formula/ccjanus.rb
          sed -i "s/__SHA256_X86_64_DARWIN__/${SHA256_X86_64_DARWIN}/" homebrew-ccjanus/Formula/ccjanus.rb
          sed -i "s/__SHA256_AARCH64_DARWIN__/${SHA256_AARCH64_DARWIN}/" homebrew-ccjanus/Formula/ccjanus.rb
          sed -i "s/__SHA256_X86_64_LINUX__/${SHA256_X86_64_LINUX}/" homebrew-ccjanus/Formula/ccjanus.rb
          sed -i "s/__SHA256_AARCH64_LINUX__/${SHA256_AARCH64_LINUX}/" homebrew-ccjanus/Formula/ccjanus.rb
      - name: Commit and push
        working-directory: homebrew-ccjanus
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ccjanus.rb
          git commit -m "Update ccjanus to ${GITHUB_REF_NAME#v}"
          git push
